name: krinry Build
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [debug, release]
      output_type:
        description: 'Output type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle, apk-split]
      target_platform:
        description: 'Target platform'
        required: false
        default: 'android-arm64'
        type: choice
        options: [all, android-arm64, android-arm, android-x64]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter create --platforms android .
      - name: Build
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          OUTPUT_TYPE="${{ github.event.inputs.output_type }}"
          TARGET_PLATFORM="${{ github.event.inputs.target_platform }}"
          if [ "$OUTPUT_TYPE" = "apk" ]; then
            if [ "$TARGET_PLATFORM" != "all" ]; then
              flutter build apk --$BUILD_TYPE --target-platform $TARGET_PLATFORM
            else
              flutter build apk --$BUILD_TYPE
            fi
          elif [ "$OUTPUT_TYPE" = "apk-split" ]; then
            flutter build apk --$BUILD_TYPE --split-per-abi
          elif [ "$OUTPUT_TYPE" = "appbundle" ]; then
            flutter build appbundle --$BUILD_TYPE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
          retention-days: 7
